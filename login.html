<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Contabilize AI</title>

<link rel="stylesheet" href="login.css">

</head>


<body>


<div class="login-container">


    <div class="login-box">


        <h1>💰 Contabilize AI</h1>


        <p class="subtitulo">
            Controle seus gastos de forma inteligente
        </p>


        <h2>Entrar</h2>


        <input 
        type="email"
        id="email"
        placeholder="Digite seu e-mail">


        <input 
        type="password"
        id="senha"
        placeholder="Digite sua senha">


        <button id="entrar">
            Entrar
        </button>


        <button id="criar">
            Criar conta
        </button>


        <button id="recuperar">
            Esqueci minha senha
        </button>


        <p id="mensagem"></p>


    </div>


</div>



<script type="module" src="auth.js"></script>


</body>

</html>
