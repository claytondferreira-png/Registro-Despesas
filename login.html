<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Contabilize AI</title>

<link rel="stylesheet" href="login.css">

</head>


<body>


<div class="login-container">


    <div class="login-box">

        <h1>💰 Contabilize AI</h1>

        <h2>Entrar</h2>


        <input 
        type="email"
        id="email"
        placeholder="Seu e-mail">


        <input 
        type="password"
        id="senha"
        placeholder="Sua senha">


        <button id="entrar">
            Entrar
        </button>


        <button id="criar">
            Criar conta
        </button>


        <p id="mensagem"></p>


    </div>


</div>


<!-- Firebase -->

<script type="module" src="auth.js"></script>


</body>

</html>
